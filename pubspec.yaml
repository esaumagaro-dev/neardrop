name: neardrop
description: NearDrop - Modern cross-platform file sharing ecosystem
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Networking
  dio: ^5.4.3
  flutter_webrtc: ^0.10.2
  multicast_dns: ^0.3.2+6
  network_info_plus: ^5.0.3
  nsd: ^4.0.0
  web_socket_channel: ^2.4.5

  # Bluetooth
  flutter_blue_plus: ^1.32.12

  # Crypto
  cryptography: ^2.7.0
  pointycastle: ^3.9.1

  # Animations
  rive: ^0.13.13
  lottie: ^3.1.2

  # UI / Adaptive
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  glassmorphism: ^3.0.0

  # NearLink
  clipboard_watcher: ^0.2.1
  super_clipboard: ^0.8.16
  local_notifier: ^0.1.6
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Utilities
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
