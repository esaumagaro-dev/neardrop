name: Signaling Server CI

on:
  push:
    branches: [main]
    paths:
      - 'signaling_server/**'
  pull_request:
    paths:
      - 'signaling_server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signaling_server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: docker build -t neardrop-signaling:ci .
